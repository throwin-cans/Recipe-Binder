<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Recipe Binder</title>
  <meta name="description" content="My personal recipe binder" />

  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#2d5a3d" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Recipes" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" sizes="512x512" href="icons/icon-512.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lato:wght@400;700;800&display=swap" rel="stylesheet" />

  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #f0f7f2; -webkit-font-smoothing: antialiased; }
    body { padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    button { -webkit-tap-highlight-color: transparent; }
    input { -webkit-appearance: none; appearance: none; }
  </style>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useRef, useEffect, useMemo } = React;

    const MEAL_ORDER = ["Breakfast", "Lunch", "Dinner", "Sides", "Snacks", "Desserts", "Drinks"];
    const TIME_BUCKETS = [
      { id: "all", label: "Any time" },
      { id: "quick", label: "≤ 30 min", max: 30 },
      { id: "medium", label: "30–60 min", min: 30, max: 60 },
      { id: "long", label: "60+ min", min: 60 },
    ];

    function formatAmount(amount, multiplier) {
      const val = amount * multiplier;
      if (val === Math.floor(val)) return String(val);
      const whole = Math.floor(val);
      const dec = val - whole;
      const fracs = [[0.125, "⅛"], [0.25, "¼"], [0.333, "⅓"], [0.5, "½"], [0.667, "⅔"], [0.75, "¾"]];
      for (const [d, sym] of fracs) {
        if (Math.abs(dec - d) < 0.05) return whole > 0 ? `${whole} ${sym}` : sym;
      }
      return val.toFixed(1);
    }

    function formatTime(s) {
      if (s < 60) return `${s}s`;
      const m = Math.floor(s / 60), r = s % 60;
      return r > 0 ? `${m}m ${r}s` : `${m}m`;
    }

    function getTotalMinutes(recipe) {
      if (typeof recipe.totalMinutes === "number") return recipe.totalMinutes;
      const totalSec = (recipe.steps || []).reduce((a, s) => a + (s.timer || 0), 0);
      return Math.max(15, Math.ceil(totalSec / 60));
    }

    function TimerWidget({ seconds }) {
      const [remaining, setRemaining] = useState(seconds);
      const [running, setRunning] = useState(false);
      const ref = useRef(null);
      const pct = (remaining / seconds) * 100;
      const r = 13;
      const circ = 2 * Math.PI * r;

      const toggle = () => {
        if (running) { clearInterval(ref.current); setRunning(false); }
        else {
          setRunning(true);
          ref.current = setInterval(() => {
            setRemaining(v => {
              if (v <= 1) { clearInterval(ref.current); setRunning(false); return 0; }
              return v - 1;
            });
          }, 1000);
        }
      };

      const reset = () => { clearInterval(ref.current); setRunning(false); setRemaining(seconds); };
      useEffect(() => () => clearInterval(ref.current), []);

      return (
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 10 }}>
          <svg width="32" height="32" style={{ transform: "rotate(-90deg)", flexShrink: 0 }}>
            <circle cx="16" cy="16" r={r} fill="none" stroke="#e2e8e4" strokeWidth="3" />
            <circle cx="16" cy="16" r={r} fill="none" stroke="#5a8a6a" strokeWidth="3"
              strokeDasharray={circ} strokeDashoffset={circ * (1 - pct / 100)}
              style={{ transition: "stroke-dashoffset 0.8s linear" }} />
          </svg>
          <span style={{ fontSize: 12, fontWeight: 700, color: "#5a8a6a", minWidth: 36, fontFamily: "monospace" }}>
            {remaining === 0 ? "Done!" : formatTime(remaining)}
          </span>
          <button onClick={toggle} style={{ padding: "3px 10px", borderRadius: 20, border: "1.5px solid #5a8a6a", background: running ? "#5a8a6a" : "transparent", color: running ? "white" : "#5a8a6a", fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: "sans-serif" }}>
            {running ? "Pause" : remaining === seconds ? "Start" : remaining === 0 ? "✓" : "Resume"}
          </button>
          {remaining !== seconds && remaining !== 0 && (
            <button onClick={reset} style={{ padding: "3px 8px", borderRadius: 20, border: "1px solid #ccc", background: "transparent", color: "#999", fontSize: 11, cursor: "pointer", fontFamily: "sans-serif" }}>Reset</button>
          )}
        </div>
      );
    }

    function RecipeView({ recipe, onBack, cart, onCartChange, onEdit, onDelete }) {
      const hasVariants = Array.isArray(recipe.variants) && recipe.variants.length > 0;
      const [variantIdx, setVariantIdx] = useState(-1); // -1 = main
      const activeVariant = variantIdx >= 0 ? recipe.variants[variantIdx] : null;

      // Merge: variant overrides the main recipe's fields when present
      const activeRecipe = activeVariant ? {
        ...recipe,
        ingredients: activeVariant.ingredients && activeVariant.ingredients.length ? activeVariant.ingredients : recipe.ingredients,
        steps: activeVariant.steps && activeVariant.steps.length ? activeVariant.steps : recipe.steps,
        prep: activeVariant.prep && activeVariant.prep.length ? activeVariant.prep : recipe.prep,
        notes: activeVariant.notes || recipe.notes,
        baseServings: typeof activeVariant.baseServings === "number" ? activeVariant.baseServings : recipe.baseServings,
      } : recipe;

      const [servings, setServings] = useState(activeRecipe.baseServings);
      const [done, setDone] = useState(new Set());
      const [prepDone, setPrepDone] = useState(new Set());
      const [showPrep, setShowPrep] = useState(false);
      const [expandedSubs, setExpandedSubs] = useState(new Set());
      const mult = servings / activeRecipe.baseServings;
      const toggleStep = id => setDone(p => {
        const n = new Set(p);
        n.has(id) ? n.delete(id) : n.add(id);
        return n;
      });
      const togglePrepStep = id => setPrepDone(p => {
        const n = new Set(p);
        n.has(id) ? n.delete(id) : n.add(id);
        return n;
      });
      const toggleSubExpand = id => setExpandedSubs(p => {
        const n = new Set(p);
        n.has(id) ? n.delete(id) : n.add(id);
        return n;
      });

      // Personal cooking notes — stored locally per recipe ID
      const [personalNotes, setPersonalNotes] = useState(() => {
        try {
          const stored = JSON.parse(localStorage.getItem("rb_personal_notes") || "{}");
          return stored[recipe.id] || "";
        } catch { return ""; }
      });
      const savePersonalNotes = (val) => {
        setPersonalNotes(val);
        try {
          const stored = JSON.parse(localStorage.getItem("rb_personal_notes") || "{}");
          if (val.trim()) stored[recipe.id] = val; else delete stored[recipe.id];
          localStorage.setItem("rb_personal_notes", JSON.stringify(stored));
        } catch {}
      };

      // When variant changes, reset servings to variant's base and clear step progress
      useEffect(() => {
        setServings(activeRecipe.baseServings);
        setDone(new Set());
        setPrepDone(new Set());
      }, [variantIdx]);

      const hasPrep = Array.isArray(activeRecipe.prep) && activeRecipe.prep.length > 0;

      const cartEntry = cart.find(c => c.recipeId === recipe.id);
      const inCart = !!cartEntry;
      const [includeSeasonings, setIncludeSeasonings] = useState(cartEntry ? cartEntry.includeSeasonings : true);

      const seasoningCount = activeRecipe.ingredients.filter(i => isSeasoning(i.name)).length;

      const toggleCart = () => {
        if (inCart) {
          onCartChange(cart.filter(c => c.recipeId !== recipe.id));
        } else {
          onCartChange([...cart, { recipeId: recipe.id, includeSeasonings }]);
        }
      };

      const updateSeasoningsFlag = (newValue) => {
        setIncludeSeasonings(newValue);
        if (inCart) {
          onCartChange(cart.map(c => c.recipeId === recipe.id ? { ...c, includeSeasonings: newValue } : c));
        }
      };

      const savePDF = () => {
        const html = `<!DOCTYPE html><html><head><meta charset="utf-8"><title>${recipe.title}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lato:wght@400;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Lato',sans-serif;color:#222;padding:48px;max-width:680px;margin:0 auto;background:#fff}
  h1{font-family:'Playfair Display',serif;font-size:30px;color:#2d5a3d;margin-bottom:6px}
  .meta{color:#777;font-size:13px;margin-bottom:20px}
  hr{border:none;border-top:2px solid #2d5a3d;margin:16px 0}
  h2{font-family:'Playfair Display',serif;font-size:17px;color:#1a3d28;margin:18px 0 10px}
  .ing{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #eee;font-size:14px}
  .ing .amt{font-weight:700;color:#2d5a3d}
  ol{padding-left:18px} ol li{padding:7px 0;font-size:14px;line-height:1.6}
  ol li b{color:#1a3d28}
  .notes{background:#f2faf5;border-left:3px solid #2d5a3d;padding:12px 16px;margin-top:18px;font-size:13px;line-height:1.6}
  .credit{background:#f4f1fb;border-left:3px solid #7a5ca8;padding:10px 16px;margin-top:12px;font-size:12px;color:#3e2e5a;line-height:1.5}
  .credit a{color:#5a4387}
</style></head><body>
<h1>${recipe.emoji} ${recipe.title}${activeVariant ? ` — ${activeVariant.name}` : ""}</h1>
<p class="meta">Servings: ${servings} &nbsp;·&nbsp; ${recipe.tag} &nbsp;·&nbsp; ~${getTotalMinutes(recipe)} min</p>
<hr>
<h2>Ingredients</h2>
${activeRecipe.ingredients.map(i => `<div class="ing"><span>${i.name}</span><span class="amt">${formatAmount(i.amount, mult)}${i.unit ? " " + i.unit : ""}</span></div>`).join("")}
<h2>Instructions</h2>
<ol>${activeRecipe.steps.map(s => `<li><b>${s.title}:</b> ${s.content}${s.timer ? ` <em>(~${formatTime(s.timer)})</em>` : ""}</li>`).join("")}</ol>
<div class="notes"><b>Tips:</b> ${activeRecipe.notes || ""}</div>
${recipe.creator && (recipe.creator.name || recipe.creator.url || recipe.creator.notes) ? `<div class="credit"><b>Recipe by:</b> ${recipe.creator.name || ""}${recipe.creator.notes ? " — " + recipe.creator.notes : ""}${recipe.creator.url ? ` (<a href="${recipe.creator.url}">${recipe.creator.url}</a>)` : ""}</div>` : ""}
</body></html>`;
        const w = window.open("", "_blank");
        w.document.write(html);
        w.document.close();
        w.focus();
        setTimeout(() => w.print(), 400);
      };

      return (
        <div style={{ animation: "slideIn 0.25s ease" }}>
          <div style={{ display: "flex", alignItems: "center", marginBottom: 16 }}>
            <button onClick={onBack} style={{ display: "flex", alignItems: "center", gap: 6, background: "none", border: "none", color: "#2d5a3d", fontSize: 13, fontWeight: 700, cursor: "pointer", fontFamily: "sans-serif", padding: 0 }}>
              ← Back to Binder
            </button>
            <div style={{ marginLeft: "auto", display: "flex", gap: 8 }}>
              {onEdit && (
                <button
                  onClick={() => onEdit(recipe)}
                  aria-label="Edit recipe"
                  style={{
                    width: 34, height: 34, borderRadius: 8,
                    border: "1.5px solid #c8e6d4", background: "white",
                    cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center"
                  }}
                >
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
                    <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7" stroke="#2d5a3d" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                    <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z" stroke="#2d5a3d" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                  </svg>
                </button>
              )}
              {onDelete && (
                <button
                  onClick={() => onDelete(recipe)}
                  aria-label="Delete recipe"
                  style={{
                    width: 34, height: 34, borderRadius: 8,
                    border: "1.5px solid #f4c1c1", background: "white",
                    cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center"
                  }}
                >
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
                    <path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6M10 11v6M14 11v6" stroke="#b33" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                  </svg>
                </button>
              )}
            </div>
          </div>
          <div style={{ background: "white", borderRadius: 16, overflow: "hidden", boxShadow: "0 4px 24px rgba(0,0,0,0.08)" }}>
            <div style={{ background: "linear-gradient(135deg, #2d5a3d 0%, #4a8c63 100%)", padding: "28px 28px 24px" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 12, marginBottom: 8 }}>
                <div style={{ fontSize: 10, letterSpacing: 3, color: "#a8d5b5", fontFamily: "sans-serif", fontWeight: 800, textTransform: "uppercase" }}>{recipe.tag}</div>
                <div style={{ fontSize: 10, letterSpacing: 2, color: "#a8d5b5", fontFamily: "sans-serif", fontWeight: 800 }}>~{getTotalMinutes(recipe)} MIN</div>
              </div>
              <div style={{ fontSize: 36, marginBottom: 6 }}>{recipe.emoji}</div>
              <h2 style={{ fontSize: 22, fontWeight: 700, color: "white", margin: 0, fontFamily: "'Playfair Display', serif" }}>{recipe.title}</h2>
              <p style={{ color: "#a8d5b5", marginTop: 6, fontSize: 13, fontStyle: "italic", fontFamily: "sans-serif" }}>{activeVariant ? activeVariant.description || recipe.description : recipe.description}</p>
            </div>
            <div style={{ padding: "22px 28px" }}>
              {hasVariants && (
                <div style={{ marginBottom: 18 }}>
                  <div style={{ fontFamily: "sans-serif", fontSize: 11, fontWeight: 800, letterSpacing: 2, color: "#2d5a3d", textTransform: "uppercase", marginBottom: 8 }}>Version</div>
                  <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                    <button
                      onClick={() => setVariantIdx(-1)}
                      style={{
                        padding: "7px 14px", borderRadius: 20,
                        border: variantIdx === -1 ? "1.5px solid #2d5a3d" : "1.5px solid #c8e6d4",
                        background: variantIdx === -1 ? "#2d5a3d" : "white",
                        color: variantIdx === -1 ? "white" : "#2d5a3d",
                        fontSize: 12, fontWeight: 700, cursor: "pointer",
                        fontFamily: "'Lato', sans-serif", whiteSpace: "nowrap"
                      }}
                    >Main</button>
                    {recipe.variants.map((v, idx) => (
                      <button
                        key={idx}
                        onClick={() => setVariantIdx(idx)}
                        style={{
                          padding: "7px 14px", borderRadius: 20,
                          border: variantIdx === idx ? "1.5px solid #2d5a3d" : "1.5px solid #c8e6d4",
                          background: variantIdx === idx ? "#2d5a3d" : "white",
                          color: variantIdx === idx ? "white" : "#2d5a3d",
                          fontSize: 12, fontWeight: 700, cursor: "pointer",
                          fontFamily: "'Lato', sans-serif", whiteSpace: "nowrap"
                        }}
                      >{v.name}</button>
                    ))}
                  </div>
                </div>
              )}
              <div style={{ display: "flex", alignItems: "center", background: "#f4fbf6", borderRadius: 10, padding: "12px 16px", marginBottom: 22 }}>
                <span style={{ fontFamily: "sans-serif", fontSize: 13, fontWeight: 700, color: "#2d5a3d" }}>Servings</span>
                <div style={{ display: "flex", alignItems: "center", gap: 12, marginLeft: "auto" }}>
                  <button onClick={() => setServings(s => Math.max(1, s - 1))} style={{ width: 26, height: 26, borderRadius: "50%", border: "1.5px solid #2d5a3d", background: "transparent", color: "#2d5a3d", fontSize: 14, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700 }}>−</button>
                  <span style={{ fontFamily: "sans-serif", fontSize: 18, fontWeight: 800, color: "#2d5a3d", minWidth: 20, textAlign: "center" }}>{servings}</span>
                  <button onClick={() => setServings(s => s + 1)} style={{ width: 26, height: 26, borderRadius: "50%", border: "1.5px solid #2d5a3d", background: "transparent", color: "#2d5a3d", fontSize: 14, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700 }}>+</button>
                </div>
              </div>
              <div style={{ marginBottom: 22 }}>
                <div style={{ fontFamily: "sans-serif", fontSize: 11, fontWeight: 800, letterSpacing: 2, color: "#2d5a3d", textTransform: "uppercase", marginBottom: 12 }}>Ingredients</div>
                {activeRecipe.ingredients.map((ing, i) => {
                  const hasSubs = Array.isArray(ing.substitutes) && ing.substitutes.length > 0;
                  const isExpanded = expandedSubs.has(ing.id);
                  return (
                    <div key={ing.id} style={{ borderBottom: i < activeRecipe.ingredients.length - 1 ? "1px solid #edf7f1" : "none" }}>
                      <div
                        onClick={hasSubs ? () => toggleSubExpand(ing.id) : undefined}
                        style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 0", cursor: hasSubs ? "pointer" : "default" }}
                      >
                        <span style={{ fontFamily: "sans-serif", fontSize: 14, color: "#333", display: "flex", alignItems: "center", gap: 6 }}>
                          {ing.name}
                          {hasSubs && (
                            <span style={{
                              fontSize: 9, fontWeight: 800, color: "#5a8a6a",
                              background: "#edf7f1", padding: "2px 6px", borderRadius: 10,
                              letterSpacing: 0.5, textTransform: "uppercase"
                            }}>{isExpanded ? "▲" : "▼"} SUBS</span>
                          )}
                        </span>
                        <span style={{ fontFamily: "sans-serif", fontSize: 14, fontWeight: 800, color: "#2d5a3d", marginLeft: 12, flexShrink: 0 }}>{formatAmount(ing.amount, mult)}{ing.unit ? ` ${ing.unit}` : ""}</span>
                      </div>
                      {hasSubs && isExpanded && (
                        <div style={{ padding: "2px 0 10px 0", fontFamily: "sans-serif", fontSize: 12, color: "#5a8a6a", fontStyle: "italic", lineHeight: 1.5 }}>
                          Or: {ing.substitutes.join(", ")}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>

              {hasPrep && (
                <div style={{ marginBottom: 22, background: "#f9fcfa", border: "1px solid #e8f5ec", borderRadius: 10, overflow: "hidden" }}>
                  <div
                    onClick={() => setShowPrep(v => !v)}
                    style={{ display: "flex", alignItems: "center", gap: 10, padding: "12px 16px", cursor: "pointer" }}
                  >
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" style={{ transform: showPrep ? "rotate(90deg)" : "none", transition: "transform 0.15s" }}>
                      <path d="M9 18l6-6-6-6" stroke="#2d5a3d" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>
                    </svg>
                    <div style={{ fontFamily: "sans-serif", fontSize: 11, fontWeight: 800, letterSpacing: 2, color: "#2d5a3d", textTransform: "uppercase" }}>Mise en Place</div>
                    <div style={{ fontFamily: "sans-serif", fontSize: 11, color: "#789", marginLeft: "auto" }}>{activeRecipe.prep.length} item{activeRecipe.prep.length !== 1 ? "s" : ""}</div>
                  </div>
                  {showPrep && (
                    <div style={{ padding: "0 16px 12px", animation: "slideDown 0.15s ease" }}>
                      {activeRecipe.prep.map((p, i) => {
                        const isDone = prepDone.has(p.id);
                        return (
                          <div
                            key={p.id}
                            onClick={() => togglePrepStep(p.id)}
                            style={{
                              display: "flex", gap: 10, padding: "8px 0",
                              alignItems: "flex-start", cursor: "pointer",
                              opacity: isDone ? 0.4 : 1, transition: "opacity 0.2s",
                              borderTop: i > 0 ? "1px solid #edf7f1" : "none"
                            }}
                          >
                            <div style={{
                              width: 20, height: 20, borderRadius: 4,
                              border: `2px solid ${isDone ? "#2d5a3d" : "#c8e6d4"}`,
                              background: isDone ? "#2d5a3d" : "transparent",
                              color: "white",
                              display: "flex", alignItems: "center", justifyContent: "center",
                              flexShrink: 0, marginTop: 1
                            }}>
                              {isDone && <span style={{ fontSize: 12, fontWeight: 800 }}>✓</span>}
                            </div>
                            <div style={{
                              fontFamily: "sans-serif", fontSize: 13, color: "#444", lineHeight: 1.55,
                              textDecoration: isDone ? "line-through" : "none"
                            }}>{p.content}</div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              )}

              <div style={{ borderTop: "1.5px solid #e8f5ec", marginBottom: 22 }} />
              <div style={{ marginBottom: 22 }}>
                <div style={{ fontFamily: "sans-serif", fontSize: 11, fontWeight: 800, letterSpacing: 2, color: "#2d5a3d", textTransform: "uppercase", marginBottom: 12 }}>Instructions</div>
                {activeRecipe.steps.map((step, i) => {
                  const isDone = done.has(step.id);
                  return (
                    <div key={step.id} style={{ display: "flex", gap: 14, padding: "13px 0", borderBottom: i < activeRecipe.steps.length - 1 ? "1px solid #edf7f1" : "none", opacity: isDone ? 0.4 : 1, transition: "opacity 0.2s" }}>

    function matchesSearch(recipe, query) {
      if (!query) return true;
      const q = query.toLowerCase();
      if (recipe.title?.toLowerCase().includes(q)) return true;
      if (recipe.description?.toLowerCase().includes(q)) return true;
      if (recipe.tag?.toLowerCase().includes(q)) return true;
      if ((recipe.ingredients || []).some(i => i.name?.toLowerCase().includes(q))) return true;
      if ((recipe.steps || []).some(s =>
        s.title?.toLowerCase().includes(q) || s.content?.toLowerCase().includes(q)
      )) return true;
      if (recipe.notes?.toLowerCase().includes(q)) return true;
      return false;
    }

    function matchesTimeBucket(recipe, bucketId) {
      if (bucketId === "all") return true;
      const bucket = TIME_BUCKETS.find(b => b.id === bucketId);
      if (!bucket) return true;
      const t = getTotalMinutes(recipe);
      if (bucket.min !== undefined && t < bucket.min) return false;
      if (bucket.max !== undefined && t > bucket.max) return false;
      return true;
    }

    // ── Seasoning detection ──
    const SEASONING_KEYWORDS = [
      "salt", "pepper", "paprika", "cumin", "garlic powder", "onion powder",
      "oregano", "basil", "thyme", "cayenne", "chili powder", "cinnamon",
      "nutmeg", "sage", "rosemary", "bay leaf", "red pepper flakes",
      "seasoning", "spice", "herb", "turmeric", "coriander", "cardamom",
      "clove", "allspice", "dill", "tarragon", "mustard powder", "curry powder"
    ];
    function isSeasoning(ingredientName) {
      if (!ingredientName) return false;
      const lower = ingredientName.toLowerCase();
      return SEASONING_KEYWORDS.some(kw => lower.includes(kw));
    }

    // ── Favorites storage ──
    function loadFavorites() {
      try { return new Set(JSON.parse(localStorage.getItem("rb_favorites") || "[]")); }
      catch { return new Set(); }
    }
    function saveFavorites(favSet) {
      localStorage.setItem("rb_favorites", JSON.stringify([...favSet]));
    }

    // ── Cart storage ──
    // Shape: [{ recipeId, includeSeasonings }]
    function loadCart() {
      try { return JSON.parse(localStorage.getItem("rb_cart") || "[]"); }
      catch { return []; }
    }
    function saveCart(cart) {
      localStorage.setItem("rb_cart", JSON.stringify(cart));
    }
    // Checked items in cart (set of "recipeId::ingredientId" keys)
    function loadCartChecks() {
      try { return new Set(JSON.parse(localStorage.getItem("rb_cart_checks") || "[]")); }
      catch { return new Set(); }
    }
    function saveCartChecks(checks) {
      localStorage.setItem("rb_cart_checks", JSON.stringify([...checks]));
    }

    // ── Cart View ──

    function aggregateCartIngredients(cart, recipes) {
      // Build raw list first
      const raw = [];
      cart.forEach(entry => {
        const recipe = recipes.find(r => r.id === entry.recipeId);
        if (!recipe) return;
        recipe.ingredients.forEach(ing => {
          const seasoning = isSeasoning(ing.name);
          if (seasoning && !entry.includeSeasonings) return;
          raw.push({
            recipeId: recipe.id,
            recipeTitle: recipe.title,
            recipeEmoji: recipe.emoji,
            ingredientId: ing.id,
            name: ing.name,
            amount: ing.amount,
            unit: ing.unit,
            isSeasoning: seasoning,
          });
        });
      });

      // Merge: same normalized name + same unit = add amounts; track source recipes
      const mergedMap = new Map();
      raw.forEach(it => {
        // Normalize: lowercase + trim for matching
        const nameKey = (it.name || "").toLowerCase().trim();
        const unitKey = (it.unit || "").toLowerCase().trim();
        const key = `${nameKey}||${unitKey}`;
        if (mergedMap.has(key)) {
          const existing = mergedMap.get(key);
          existing.amount += (it.amount || 0);
          if (!existing.sources.find(s => s.recipeId === it.recipeId)) {
            existing.sources.push({
              recipeId: it.recipeId,
              recipeTitle: it.recipeTitle,
              recipeEmoji: it.recipeEmoji,
              ingredientId: it.ingredientId,
            });
          } else {
            // same recipe, same ingredient appears twice — just reuse sources
          }
        } else {
          mergedMap.set(key, {
            key: `merged::${key}`,
            name: it.name,
            amount: it.amount || 0,
            unit: it.unit,
            isSeasoning: it.isSeasoning,
            sources: [{
              recipeId: it.recipeId,
              recipeTitle: it.recipeTitle,
              recipeEmoji: it.recipeEmoji,
              ingredientId: it.ingredientId,
            }],
          });
        }
      });

      return [...mergedMap.values()];
    }

    // Group items by recipe for display
    function groupByRecipe(items) {
      const map = new Map();
      items.forEach(it => {
        if (!map.has(it.recipeId)) {
          map.set(it.recipeId, { title: it.recipeTitle, emoji: it.recipeEmoji, items: [] });
        }
        map.get(it.recipeId).items.push(it);
      });
      return [...map.values()];
    }

    function CartView({ cart, recipes, onBack, onCartChange, checks, onChecksChange }) {
      const items = aggregateCartIngredients(cart, recipes);
      const totalItems = items.length;
      const checkedCount = items.filter(it => checks.has(it.key)).length;

      const toggleCheck = (key) => {
        const newChecks = new Set(checks);
        newChecks.has(key) ? newChecks.delete(key) : newChecks.add(key);
        onChecksChange(newChecks);
      };

      const clearCart = () => {
        if (confirm("Clear all recipes from your cart?")) {
          onCartChange([]);
          onChecksChange(new Set());
        }
      };

      const removeRecipeFromCart = (recipeId) => {
        onCartChange(cart.filter(c => c.recipeId !== recipeId));
      };

      const toggleSeasoningsFor = (recipeId, newValue) => {
        onCartChange(cart.map(c => c.recipeId === recipeId ? { ...c, includeSeasonings: newValue } : c));
      };

      const printPDF = () => {
        const itemsHtml = items.map(it => {
          const amt = it.amount ? `${formatAmount(it.amount, 1)}${it.unit ? " " + it.unit : ""} ` : "";
          const sources = it.sources.length > 1 ? ` <span class="src">(${it.sources.map(s => s.recipeTitle).join(", ")})</span>` : "";
          return `<li><label><input type="checkbox"> ${amt}${it.name}${sources}</label></li>`;
        }).join("");

        const html = `<!DOCTYPE html><html><head><meta charset="utf-8"><title>Shopping List</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lato:wght@400;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Lato',sans-serif;color:#222;padding:40px;max-width:640px;margin:0 auto;background:#fff}
  h1{font-family:'Playfair Display',serif;font-size:28px;color:#2d5a3d;margin-bottom:4px}
  .meta{color:#777;font-size:13px;margin-bottom:18px}
  hr{border:none;border-top:2px solid #2d5a3d;margin:12px 0 18px}
  ul{list-style:none;padding:0}
  li{padding:9px 0;font-size:14px;line-height:1.5;border-bottom:1px solid #f0f0f0}
  label{display:flex;align-items:center;gap:10px;cursor:pointer}
  .src{font-size:11px;color:#999;font-style:italic;margin-left:6px}
  input[type=checkbox]{width:16px;height:16px;accent-color:#2d5a3d}
  @media print { body { padding: 20px; } }
</style></head><body>
<h1>🛒 Shopping List</h1>
<p class="meta">${cart.length} recipe${cart.length !== 1 ? "s" : ""} · ${totalItems} item${totalItems !== 1 ? "s" : ""}</p>
<hr>
<ul>${itemsHtml}</ul>
</body></html>`;
        const w = window.open("", "_blank");
        w.document.write(html);
        w.document.close();
        w.focus();
        setTimeout(() => w.print(), 400);
      };

      return (
        <div style={{ animation: "slideIn 0.25s ease" }}>
          <button onClick={onBack} style={{ display: "flex", alignItems: "center", gap: 6, background: "none", border: "none", color: "#2d5a3d", fontSize: 13, fontWeight: 700, cursor: "pointer", marginBottom: 16, fontFamily: "sans-serif", padding: 0 }}>
            ← Back to Binder
          </button>

          <div style={{ background: "white", borderRadius: 16, overflow: "hidden", boxShadow: "0 4px 24px rgba(0,0,0,0.08)" }}>
            <div style={{ background: "linear-gradient(135deg, #2d5a3d 0%, #4a8c63 100%)", padding: "24px 28px 22px" }}>
              <div style={{ fontSize: 10, letterSpacing: 3, color: "#a8d5b5", fontFamily: "sans-serif", fontWeight: 800, textTransform: "uppercase", marginBottom: 6 }}>Shopping</div>
              <div style={{ fontSize: 32, marginBottom: 4 }}>🛒</div>
              <h2 style={{ fontSize: 22, fontWeight: 700, color: "white", margin: 0, fontFamily: "'Playfair Display', serif" }}>Cart</h2>
              <p style={{ color: "#a8d5b5", marginTop: 6, fontSize: 13, fontFamily: "sans-serif" }}>
                {cart.length === 0 ? "Empty — add recipes from your binder" : `${cart.length} recipe${cart.length !== 1 ? "s" : ""} · ${totalItems} item${totalItems !== 1 ? "s" : ""} (${checkedCount} checked)`}
              </p>
            </div>

            <div style={{ padding: "22px 22px" }}>
              {cart.length === 0 ? (
                <div style={{ textAlign: "center", padding: "30px 10px", color: "#789", fontSize: 14 }}>
                  Your cart is empty.<br />
                  Open a recipe and tap "Add to Cart" to start building your shopping list.
                </div>
              ) : (
                <React.Fragment>
                  {/* Recipes in cart — compact summary with remove + seasonings controls */}
                  <div style={{ marginBottom: 20, paddingBottom: 16, borderBottom: "1px solid #edf7f1" }}>
                    <div style={{ fontFamily: "sans-serif", fontSize: 10, fontWeight: 800, letterSpacing: 2, color: "#5a8a6a", textTransform: "uppercase", marginBottom: 10 }}>Recipes in cart</div>
                    {cart.map(entry => {
                      const recipe = recipes.find(r => r.id === entry.recipeId);
                      if (!recipe) return null;
                      const seasoningCount = recipe.ingredients.filter(i => isSeasoning(i.name)).length;
                      return (
                        <div key={entry.recipeId} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 0" }}>
                          <span style={{ fontSize: 18 }}>{recipe.emoji}</span>
                          <div style={{ flex: 1, minWidth: 0 }}>
                            <div style={{ fontFamily: "'Playfair Display', serif", fontSize: 14, fontWeight: 700, color: "#1a3d28", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{recipe.title}</div>
                            {seasoningCount > 0 && (
                              <label style={{ display: "flex", alignItems: "center", gap: 6, marginTop: 2, fontSize: 11, color: "#5a8a6a", cursor: "pointer", fontFamily: "sans-serif" }}>
                                <input
                                  type="checkbox"
                                  checked={entry.includeSeasonings}
                                  onChange={e => toggleSeasoningsFor(entry.recipeId, e.target.checked)}
                                  style={{ width: 12, height: 12, accentColor: "#2d5a3d", margin: 0, cursor: "pointer" }}
                                />
                                Seasonings ({seasoningCount})
                              </label>
                            )}
                          </div>
                          <button
                            onClick={() => removeRecipeFromCart(entry.recipeId)}
                            aria-label="Remove recipe from cart"
                            style={{ background: "transparent", border: "none", color: "#b33", fontSize: 18, cursor: "pointer", padding: "0 4px", lineHeight: 1 }}
                          >×</button>
                        </div>
                      );
                    })}
                  </div>

                  {/* Shopping list — merged items */}
                  <div style={{ marginBottom: 18 }}>
                    <div style={{ fontFamily: "sans-serif", fontSize: 10, fontWeight: 800, letterSpacing: 2, color: "#5a8a6a", textTransform: "uppercase", marginBottom: 10 }}>Shopping List</div>
                    {items.map(it => {
                      const isChecked = checks.has(it.key);
                      const showSources = it.sources.length > 1;
                      return (
                        <label
                          key={it.key}
                          style={{
                            display: "flex", gap: 10, padding: "10px 0",
                            borderBottom: "1px solid #edf7f1",
                            cursor: "pointer",
                            opacity: isChecked ? 0.4 : 1, transition: "opacity 0.15s",
                            alignItems: "flex-start"
                          }}
                        >
                          <input
                            type="checkbox"
                            checked={isChecked}
                            onChange={() => toggleCheck(it.key)}
                            style={{ width: 18, height: 18, accentColor: "#2d5a3d", margin: 0, marginTop: 2, cursor: "pointer", flexShrink: 0 }}
                          />
                          <div style={{ flex: 1, minWidth: 0 }}>
                            <div style={{
                              fontFamily: "sans-serif", fontSize: 13, color: "#333", lineHeight: 1.4,
                              textDecoration: isChecked ? "line-through" : "none"
                            }}>
                              {it.amount ? (
                                <React.Fragment>
                                  <strong style={{ color: "#2d5a3d" }}>{formatAmount(it.amount, 1)}{it.unit ? ` ${it.unit}` : ""}</strong>
                                  {" "}
                                </React.Fragment>
                              ) : null}
                              {it.name}
                            </div>
                            {showSources && (
                              <div style={{ fontFamily: "sans-serif", fontSize: 10, color: "#789", marginTop: 3, fontStyle: "italic" }}>
                                For: {it.sources.map(s => `${s.recipeEmoji} ${s.recipeTitle}`).join(" · ")}
                              </div>
                            )}
                          </div>
                        </label>
                      );
                    })}
                  </div>

                  <div style={{ display: "flex", gap: 8, marginTop: 18 }}>
                    <button
                      onClick={printPDF}
                      style={{ flex: 1, padding: "12px", borderRadius: 10, background: "#2d5a3d", border: "none", color: "white", fontSize: 13, fontWeight: 800, letterSpacing: 1, cursor: "pointer", fontFamily: "sans-serif" }}
                    >
                      Print as PDF
                    </button>
                    <button
                      onClick={clearCart}
                      style={{ padding: "12px 16px", borderRadius: 10, background: "transparent", border: "1.5px solid #b33", color: "#b33", fontSize: 12, fontWeight: 800, letterSpacing: 1, cursor: "pointer", fontFamily: "sans-serif" }}
                    >
                      Clear
                    </button>
                  </div>
                </React.Fragment>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ── Cart View ──

    function RecipeBinder() {
      const [active, setActive] = useState(null);
      const [showCart, setShowCart] = useState(false);
      const [recipes, setRecipes] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);

      const [search, setSearch] = useState("");
      const [mealFilter, setMealFilter] = useState(() => localStorage.getItem("rb_meal") || "all");
      const [timeFilter, setTimeFilter] = useState(() => localStorage.getItem("rb_time") || "all");
      const [favoritesOnly, setFavoritesOnly] = useState(() => localStorage.getItem("rb_fav_filter") === "1");
      const [view, setView] = useState(() => localStorage.getItem("rb_view") || "list");
      const [showFilters, setShowFilters] = useState(false);
      const [refreshing, setRefreshing] = useState(false);

      const [favorites, setFavorites] = useState(() => loadFavorites());
      const [cart, setCart] = useState(() => loadCart());
      const [cartChecks, setCartChecks] = useState(() => loadCartChecks());

      const toggleFavorite = (recipeId) => {
        const newFavs = new Set(favorites);
        newFavs.has(recipeId) ? newFavs.delete(recipeId) : newFavs.add(recipeId);
        setFavorites(newFavs);
        saveFavorites(newFavs);
      };

      const updateCart = (newCart) => {
        setCart(newCart);
        saveCart(newCart);
      };

      const updateCartChecks = (newChecks) => {
        setCartChecks(newChecks);
        saveCartChecks(newChecks);
      };

      const handleEdit = (recipe) => {
        // Redirect to admin with edit action
        window.location.href = `admin.html?action=edit&id=${encodeURIComponent(recipe.id)}`;
      };

      const handleDelete = (recipe) => {
        if (confirm(`Delete "${recipe.title}"? This can't be undone.`)) {
          window.location.href = `admin.html?action=delete&id=${encodeURIComponent(recipe.id)}`;
        }
      };

      const loadRecipes = (isRefresh = false) => {
        if (isRefresh) setRefreshing(true);
        return fetch("recipes.json?t=" + Date.now(), { cache: "no-store" })
          .then(r => { if (!r.ok) throw new Error("Failed to load recipes"); return r.json(); })
          .then(data => { setRecipes(data.recipes || []); setLoading(false); setError(null); })
          .catch(err => { setError(err.message); setLoading(false); })
          .finally(() => { if (isRefresh) setRefreshing(false); });
      };

      const handleRefresh = async () => {
        if (refreshing) return;
        setRefreshing(true);
        try {
          // Clear service worker caches so code updates come through too
          if ("caches" in window) {
            const keys = await caches.keys();
            await Promise.all(keys.map(k => caches.delete(k)));
          }
          // Re-register SW to pick up any new version
          if ("serviceWorker" in navigator) {
            const regs = await navigator.serviceWorker.getRegistrations();
            await Promise.all(regs.map(r => r.update()));
          }
          // Reload with cache-bust
          location.reload();
        } catch (e) {
          setRefreshing(false);
          // Fallback: just refetch recipes
          loadRecipes(true);
        }
      };

      useEffect(() => { localStorage.setItem("rb_meal", mealFilter); }, [mealFilter]);
      useEffect(() => { localStorage.setItem("rb_time", timeFilter); }, [timeFilter]);
      useEffect(() => { localStorage.setItem("rb_view", view); }, [view]);
      useEffect(() => { localStorage.setItem("rb_fav_filter", favoritesOnly ? "1" : "0"); }, [favoritesOnly]);

      useEffect(() => {
        loadRecipes();
      }, []);

      const activeFilterCount =
        (mealFilter !== "all" ? 1 : 0) + (timeFilter !== "all" ? 1 : 0);

      const filtered = useMemo(() => {
        return recipes.filter(r =>
          matchesSearch(r, search) &&
          (mealFilter === "all" || r.mealType === mealFilter) &&
          matchesTimeBucket(r, timeFilter) &&
          (!favoritesOnly || favorites.has(r.id))
        );
      }, [recipes, search, mealFilter, timeFilter, favoritesOnly, favorites]);

      const grouped = useMemo(() => {
        return MEAL_ORDER.reduce((acc, type) => {
          const list = filtered.filter(r => r.mealType === type);
          if (list.length) acc[type] = list;
          return acc;
        }, {});
      }, [filtered]);

      if (loading) {
        return <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'Lato', sans-serif", color: "#5a8a6a" }}>Loading recipes…</div>;
      }
      if (error) {
        return <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'Lato', sans-serif", color: "#b33", padding: 20, textAlign: "center" }}>Could not load recipes: {error}</div>;
      }

      return (
        <div style={{ minHeight: "100vh", background: "#f0f7f2", padding: "24px 14px", fontFamily: "'Lato', sans-serif" }}>
          <div style={{ maxWidth: 540, margin: "0 auto" }}>
            {showCart ? (
              <CartView
                cart={cart}
                recipes={recipes}
                onBack={() => setShowCart(false)}
                onCartChange={updateCart}
                checks={cartChecks}
                onChecksChange={updateCartChecks}
              />
            ) : !active ? (
              <React.Fragment>
                <div style={{ marginBottom: 18, display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 12, animation: "fadeUp 0.3s ease" }}>
                  <div>
                    <div style={{ fontSize: 11, fontFamily: "sans-serif", fontWeight: 800, letterSpacing: 3, color: "#5a8a6a", textTransform: "uppercase", marginBottom: 4 }}>My</div>
                    <h1 style={{ fontSize: 30, fontWeight: 700, color: "#1a3d28", fontFamily: "'Playfair Display', serif", margin: 0 }}>Recipe Binder</h1>
                    <p style={{ fontFamily: "sans-serif", fontSize: 12, color: "#789", marginTop: 4 }}>
                      {filtered.length} of {recipes.length} recipes {search || activeFilterCount > 0 ? "shown" : "saved"}
                    </p>
                  </div>
                  <div style={{ display: "flex", gap: 8, alignItems: "center", marginTop: 6, flexShrink: 0 }}>
                    <button
                      onClick={() => setShowCart(true)}
                      aria-label="Cart"
                      style={{
                        position: "relative",
                        width: 40, height: 40, borderRadius: "50%",
                        border: "1.5px solid #c8e6d4",
                        background: cart.length > 0 ? "#2d5a3d" : "white",
                        color: cart.length > 0 ? "white" : "#2d5a3d",
                        cursor: "pointer",
                        display: "flex", alignItems: "center", justifyContent: "center",
                        boxShadow: "0 1px 4px rgba(0,0,0,0.04)"
                      }}
                    >
                      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                        <circle cx="9" cy="21" r="1" fill={cart.length > 0 ? "white" : "#2d5a3d"} />
                        <circle cx="20" cy="21" r="1" fill={cart.length > 0 ? "white" : "#2d5a3d"} />
                        <path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6" stroke={cart.length > 0 ? "white" : "#2d5a3d"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
                      </svg>
                      {cart.length > 0 && (
                        <span style={{
                          position: "absolute", top: -4, right: -4,
                          background: "#f7b731", color: "#1a3d28",
                          fontSize: 10, fontWeight: 800,
                          minWidth: 18, height: 18, padding: "0 5px",
                          borderRadius: 9, display: "flex", alignItems: "center", justifyContent: "center",
                          border: "2px solid white"
                        }}>{cart.length}</span>
                      )}
                    </button>
                    <button
                      onClick={handleRefresh}
                      disabled={refreshing}
                      aria-label="Refresh"
                      style={{
                        width: 40, height: 40, borderRadius: "50%",
                        border: "1.5px solid #c8e6d4",
                        background: "white",
                        color: "#2d5a3d",
                        cursor: refreshing ? "default" : "pointer",
                        display: "flex", alignItems: "center", justifyContent: "center",
                        boxShadow: "0 1px 4px rgba(0,0,0,0.04)"
                      }}
                    >
                      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" style={{ animation: refreshing ? "spin 0.8s linear infinite" : "none" }}>
                        <path d="M21 12a9 9 0 11-3-6.7L21 8" stroke="#2d5a3d" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" />
                        <path d="M21 3v5h-5" stroke="#2d5a3d" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" />
                      </svg>
                    </button>
                  </div>
                </div>

                <ControlsBar
                  search={search} onSearch={setSearch}
                  mealFilter={mealFilter} onMealFilter={setMealFilter}
                  timeFilter={timeFilter} onTimeFilter={setTimeFilter}
                  view={view} onViewChange={setView}
                  showFilters={showFilters} onToggleFilters={() => setShowFilters(v => !v)}
                  activeFilterCount={activeFilterCount}
                  favoritesOnly={favoritesOnly} onToggleFavoritesOnly={() => setFavoritesOnly(v => !v)}
                  favoritesCount={favorites.size}
                />

                {filtered.length === 0 ? (
                  <div style={{ background: "white", borderRadius: 14, padding: "40px 20px", textAlign: "center", boxShadow: "0 2px 8px rgba(0,0,0,0.05)" }}>
                    <div style={{ fontSize: 32, marginBottom: 10 }}>🔍</div>
                    <div style={{ fontFamily: "'Playfair Display', serif", fontSize: 18, color: "#1a3d28", marginBottom: 6 }}>No recipes match</div>
                    <div style={{ fontFamily: "sans-serif", fontSize: 13, color: "#789", marginBottom: 16 }}>Try different search terms or clear your filters.</div>
                    <button
                      onClick={() => { setSearch(""); setMealFilter("all"); setTimeFilter("all"); setFavoritesOnly(false); }}
                      style={{ padding: "9px 18px", borderRadius: 8, border: "1.5px solid #2d5a3d", background: "transparent", color: "#2d5a3d", fontSize: 12, fontWeight: 800, letterSpacing: 1, cursor: "pointer", fontFamily: "sans-serif" }}
                    >CLEAR ALL</button>
                  </div>
                ) : view === "grid" ? (
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(150px, 1fr))", gap: 10, animation: "fadeUp 0.35s ease" }}>
                    {filtered.map(r => (
                      <RecipeGridCard
                        key={r.id}
                        recipe={r}
                        onClick={() => setActive(r)}
                        isFavorite={favorites.has(r.id)}
                        onToggleFavorite={() => toggleFavorite(r.id)}
                        onEdit={handleEdit}
                      />
                    ))}
                  </div>
                ) : (
                  Object.entries(grouped).map(([type, list], gi) => (
                    <div key={type} style={{ marginBottom: 22, animation: `fadeUp ${0.35 + gi * 0.08}s ease` }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
                        <div style={{ fontFamily: "sans-serif", fontSize: 10, fontWeight: 800, letterSpacing: 3, color: "#2d5a3d", textTransform: "uppercase" }}>{type}</div>
                        <div style={{ fontFamily: "sans-serif", fontSize: 10, color: "#789" }}>{list.length}</div>
                        <div style={{ flex: 1, height: 1, background: "#c8e6d4" }} />
                      </div>
                      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                        {list.map(r => (
                          <RecipeListCard
                            key={r.id}
                            recipe={r}
                            onClick={() => setActive(r)}
                            isFavorite={favorites.has(r.id)}
                            onToggleFavorite={() => toggleFavorite(r.id)}
                            onEdit={handleEdit}
                          />
                        ))}
                      </div>
                    </div>
                  ))
                )}
              </React.Fragment>
            ) : (
              <RecipeView recipe={active} onBack={() => setActive(null)} cart={cart} onCartChange={updateCart} onEdit={handleEdit} onDelete={handleDelete} />
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<RecipeBinder />);
  </script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch(err => console.log("SW reg failed:", err));
      });
    }
  </script>
</body>
</html>
